# Jekyll configuration for GitHub Pages
# This file tells Jekyll not to process certain files

# Don't process index.html - serve it as-is
include:
  - index.html
  - .nojekyll

# Exclude everything else
exclude:
  - package.json
  - package-lock.json
  - pnpm-lock.yaml
  - tsconfig.json
  - node_modules
  - packages
  - scripts
  - homepage
  - understand-anything
  - understand-anything-plugin
  - .claude-plugin
  - .copilot-plugin
  - .cursor-plugin
  - .github
  - .git
  - assets
  - docs
  - READMEs
  - CLAUDE.md
  - CONTRIBUTING.md
  - install.ps1
  - install.sh
  - eslint.config.mjs
  - _config.yml

# Disable Jekyll processing
safe: true
lsi: false
future: false
show_drafts: false

